# BLOQUE 1: Redirección de HTTP a HTTPS
server {
    listen 80 default_server;
    server_name wca.nbazaes.app;

    client_max_body_size 50M;

    # Mantenemos los estáticos accesibles por HTTP si fuera necesario
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
    }

    location /_astro/ {
        alias /app/web/static/frontend/_astro/;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Redirigir el resto a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# BLOQUE 2: Servidor principal HTTPS
server {
    listen 443 ssl;
    server_name wca.nbazaes.app;

    ssl_certificate /etc/letsencrypt/live/wca.nbazaes.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wca.nbazaes.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
    }

    location /_astro/ {
        alias /app/web/static/frontend/_astro/;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}

