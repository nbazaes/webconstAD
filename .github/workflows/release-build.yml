name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image with tag version
        run: |
          docker build \
            --build-arg APP_VERSION="${GITHUB_REF_NAME}" \
            -t webconstad:${GITHUB_REF_NAME} \
            .

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
       - name: Desplegar en el servidor vía SSH
         uses: appleboy/ssh-action@master
         with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            script: |
              cd /home/nicolas/webconstAD  
              
              git config --global --add safe.directory $(pwd)
              
              # Limpiamos para evitar el error de los archivos modificados que vimos antes
              git fetch origin
              git reset --hard origin/main
              
              # Exportamos la versión e INMEDIATAMENTE levantamos el servicio
              export APP_VERSION=${{ github.ref_name }}
              docker-compose up -d --build --force-recreate
