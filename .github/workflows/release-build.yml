name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image with tag version
        run: |
          docker build \
            --build-arg APP_VERSION="${GITHUB_REF_NAME}" \
            -t webconstad:${GITHUB_REF_NAME} \
            .
