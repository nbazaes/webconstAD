name: Deploy Staging

on:
  push:
    tags:
      - 'v*-rc.*'   # v1.2.0-rc.1, v1.2.0-rc.2, etc.

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nbazaes/webconstad:staging
            ghcr.io/nbazaes/webconstad:staging-${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            NGINX_CONF=nginx.staging.conf

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/nicolas/webconstAD

            git config --global --add safe.directory $(pwd)
            git fetch --all --tags
            git checkout ${{ github.ref_name }}

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u nbazaes --password-stdin
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --force-recreate

            # Prune dangling images and keep only the 3 most recent versioned tags
            docker image prune -f
            docker images ghcr.io/nbazaes/webconstad \
              --format "{{.Repository}}:{{.Tag}}" \
              --sort=-created \
              | grep -Ev ':(staging|prod)$' \
              | tail -n +4 \
              | xargs -r docker rmi || true
