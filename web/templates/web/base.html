{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Constant Archivos Digitales{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'web/styles.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-wrap">
    <!-- Decoración: esquina superior derecha (blobs rosa + línea verde) -->
    <img src="{% static 'web/assets/g51.svg' %}" alt="" class="decor decor-top-right" aria-hidden="true">

    <!-- Decoración: rama/hoja izquierda -->
    <img src="{% static 'web/assets/g45.svg' %}" alt="" class="decor decor-leaf-left" aria-hidden="true">

    <header class="site-header">
      <div class="brand">
        <img src="{% static 'web/assets/logo.svg' %}" alt="Logo" class="logo">
        <div class="site-title">
          <img src="{% static 'web/assets/g345.png' %}" alt="Constant Archivos Digitales">
        </div>
      </div>
      <!-- Hamburger button (mobile only) -->
      <button class="hamburger" aria-label="Abrir menú" aria-expanded="false" onclick="this.classList.toggle('open');document.querySelector('.mobile-nav').classList.toggle('open');this.setAttribute('aria-expanded',this.classList.contains('open'))">
        <span></span><span></span><span></span>
      </button>
    </header>

    <!-- Mobile dropdown nav -->
    <nav class="mobile-nav" aria-label="Navegación móvil">
      <ul>
        <li><a href="{% url 'home' %}" {% if page == 'inicio' %}class="active" aria-current="page"{% endif %}>Inicio</a></li>
        <li><a href="{% url 'productos' %}" {% if page == 'productos' %}class="active" aria-current="page"{% endif %}>Productos</a></li>
        <li><a href="{% url 'uso' %}" {% if page == 'uso' %}class="active" aria-current="page"{% endif %}>Uso</a></li>
        <!-- <li><a href="{% url 'canva' %}" {% if page == 'canva' %}class="active" aria-current="page"{% endif %}>Canva</a></li> -->
        <li><a href="{% url 'gratis' %}" {% if page == 'gratis' %}class="active" aria-current="page"{% endif %}>Gratis</a></li>
        <li><a href="{% url 'contacto' %}" {% if page == 'contacto' %}class="active" aria-current="page"{% endif %}>Contacto</a></li>
      </ul>
    </nav>

    <aside class="side-nav">
      <ul>
        <li><a href="{% url 'home' %}" {% if page == 'inicio' %}class="active" aria-current="page"{% endif %}>Inicio</a></li>
        <li><a href="{% url 'productos' %}" {% if page == 'productos' %}class="active" aria-current="page"{% endif %}>Productos</a></li>
        <li><a href="{% url 'uso' %}" {% if page == 'uso' %}class="active" aria-current="page"{% endif %}>Uso</a></li>
        <!-- <li><a href="{% url 'canva' %}" {% if page == 'canva' %}class="active" aria-current="page"{% endif %}>Canva</a></li> -->
        <li><a href="{% url 'gratis' %}" {% if page == 'gratis' %}class="active" aria-current="page"{% endif %}>Gratis</a></li>
        <li><a href="{% url 'contacto' %}" {% if page == 'contacto' %}class="active" aria-current="page"{% endif %}>Contacto</a></li>
      </ul>
    </aside>

    {% block content %}{% endblock %}

  </div>

  <footer class="site-footer">
    <img src="{% static 'web/assets/g40.svg' %}" alt="" class="decor decor-bottom-left" aria-hidden="true">
    <p>Constant Archivos Digitales &copy; 2026</p>
    <p class="footer-credit">
      Web construida por <a href="https://github.com/nbazaes">nbazaes</a>
      <svg class="github-logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M12 .5a12 12 0 0 0-3.79 23.39c.6.12.82-.26.82-.58v-2.23c-3.33.73-4.03-1.4-4.03-1.4-.55-1.4-1.34-1.78-1.34-1.78-1.1-.74.08-.72.08-.72 1.22.09 1.86 1.24 1.86 1.24 1.08 1.84 2.84 1.31 3.53 1 .11-.78.42-1.31.76-1.61-2.66-.3-5.47-1.32-5.47-5.87 0-1.29.47-2.34 1.24-3.17-.12-.3-.54-1.53.12-3.19 0 0 1-.32 3.3 1.21a11.6 11.6 0 0 1 6 0c2.3-1.53 3.3-1.21 3.3-1.21.66 1.66.24 2.89.12 3.19.77.83 1.24 1.88 1.24 3.17 0 4.56-2.82 5.56-5.5 5.86.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z"/>
      </svg>
    </p>
  </footer>
</body>
</html>
