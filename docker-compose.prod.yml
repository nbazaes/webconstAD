services:
  web:
    image: ghcr.io/nbazaes/webconstad:${APP_VERSION}
    networks:
      - prod_net
    container_name: webconstad_web_prod
    env_file:
      - .env.prod  # Must include MAGIC_DNS_NAME, ADMIN_URL
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/certs:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - webconstad_media_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    networks:
      - prod_net
    container_name: webconstad_db_prod
    env_file:
      - .env.prod
    volumes:
      - webconstad_db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  webconstad_db_data_prod:
  webconstad_media_prod:

networks:
  prod_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.201.0/24
