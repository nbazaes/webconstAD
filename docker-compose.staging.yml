services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        NGINX_CONF: nginx.staging.conf
    networks:
      - staging_net
    container_name: webconstad_web_staging
    env_file:
      - .env.staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - webconstad_media_staging:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    networks:
      - staging_net
    container_name: webconstad_db_staging
    env_file:
      - .env.staging
    volumes:
      - webconstad_db_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  webconstad_db_data_staging:
  webconstad_media_staging:

networks:
  staging_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24
